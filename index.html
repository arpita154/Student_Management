<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management</title>
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #eef2f7;
        color: #1c2230;
      }

      .app-container {
        max-width: 960px;
        margin: 40px auto;
        padding: 20px;
      }

      header {
        text-align: center;
        margin-bottom: 24px;
      }

      header h1 {
        margin: 0;
        font-size: 2.4rem;
      }

      header p {
        margin: 8px 0 0;
        color: #555;
      }

      .content {
        display: grid;
        gap: 24px;
        grid-template-columns: 1fr 1fr;
      }

      .student-form,
      .student-list {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
      }

      .student-form h2,
      .student-list h2 {
        margin-top: 0;
        font-size: 1.3rem;
      }

      .student-form label {
        display: block;
        margin-bottom: 14px;
        font-weight: 600;
      }

      .student-form input {
        width: 100%;
        padding: 10px 12px;
        margin-top: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 1rem;
      }

      .student-form button {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
      }

      .student-form button:hover {
        background: #1d4ed8;
      }

      .student-list ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .student-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid #e2e8f0;
      }

      .student-list li:last-child {
        border-bottom: none;
      }

      .student-info {
        display: grid;
        gap: 4px;
      }

      .student-info span {
        color: #475569;
        font-size: 0.95rem;
      }

      .student-list button {
        padding: 8px 12px;
        border: none;
        border-radius: 10px;
        background: #ef4444;
        color: #fff;
        cursor: pointer;
      }

      .student-list button:hover {
        background: #dc2626;
      }

      .empty-message {
        color: #475569;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const students = [
        { id: 1, name: 'Ayesha', age: '16', course: 'Math' },
        { id: 2, name: 'Rohan', age: '17', course: 'Science' },
      ];

      const root = document.getElementById('root');

      function createElement(tag, attrs = {}, ...children) {
        const element = document.createElement(tag);
        Object.entries(attrs).forEach(([key, value]) => {
          if (key === 'className') {
            element.className = value;
          } else if (key.startsWith('on') && typeof value === 'function') {
            element.addEventListener(key.slice(2).toLowerCase(), value);
          } else {
            element.setAttribute(key, value);
          }
        });
        children.flat().forEach((child) => {
          element.appendChild(
            child instanceof Node ? child : document.createTextNode(child)
          );
        });
        return element;
      }

      function renderStudentList() {
        const listContainer = document.createElement('div');
        listContainer.className = 'student-list';

        const title = createElement('h2', {}, 'Student List');
        listContainer.appendChild(title);

        if (students.length === 0) {
          listContainer.appendChild(
            createElement('p', { className: 'empty-message' }, 'No students yet. Add one to get started.')
          );
          return listContainer;
        }

        const list = document.createElement('ul');
        students.forEach((student) => {
          const info = createElement(
            'div',
            { className: 'student-info' },
            createElement('strong', {}, student.name),
            createElement('span', {}, `Age: ${student.age}`),
            createElement('span', {}, `Course: ${student.course}`)
          );

          const removeButton = createElement(
            'button',
            { onClick: () => handleRemoveStudent(student.id) },
            'Remove'
          );

          const listItem = createElement('li', {}, info, removeButton);
          list.appendChild(listItem);
        });

        listContainer.appendChild(list);
        return listContainer;
      }

      function handleRemoveStudent(id) {
        const index = students.findIndex((student) => student.id === id);
        if (index !== -1) {
          students.splice(index, 1);
          renderApp();
        }
      }

      function renderForm() {
        const form = document.createElement('form');
        form.className = 'student-form';

        const title = createElement('h2', {}, 'Add Student');
        form.appendChild(title);

        const nameLabel = createElement(
          'label',
          {},
          'Name',
          createElement('input', { type: 'text', name: 'name', placeholder: 'Student name' })
        );

        const ageLabel = createElement(
          'label',
          {},
          'Age',
          createElement('input', { type: 'text', name: 'age', placeholder: 'Student age' })
        );

        const courseLabel = createElement(
          'label',
          {},
          'Course',
          createElement('input', { type: 'text', name: 'course', placeholder: 'Student course' })
        );

        const submitButton = createElement('button', { type: 'submit' }, 'Add Student');

        form.append(nameLabel, ageLabel, courseLabel, submitButton);
        form.addEventListener('submit', handleFormSubmit);

        return form;
      }

      function handleFormSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const name = form.name.value.trim();
        const age = form.age.value.trim();
        const course = form.course.value.trim();

        if (!name || !age || !course) {
          return;
        }

        students.unshift({
          id: Date.now(),
          name,
          age,
          course,
        });

        form.reset();
        renderApp();
      }

      function renderApp() {
        root.innerHTML = '';

        const appContainer = createElement('div', { className: 'app-container' });
        const header = createElement(
          'header',
          {},
          createElement('h1', {}, 'Student Management'),
          createElement('p', {}, 'Manage student records using a single-file app.')
        );

        const content = createElement('div', { className: 'content' });
        content.append(renderForm(), renderStudentList());

        appContainer.append(header, content);
        root.appendChild(appContainer);
      }

      renderApp();
    </script>
  </body>
</html>
